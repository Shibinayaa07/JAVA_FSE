spring.application.name=api-gateway
server.port=9090
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=greet-service
spring.cloud.gateway.routes[0].uri=lb://greet-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/greet-service/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/greet-service/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[1].id=customer-service
spring.cloud.gateway.routes[1].uri=lb://customer-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/customers/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/customers/(?<segment>.*), /customers/${segment}
spring.cloud.gateway.routes[1].filters[1]=CircuitBreaker=name=customerCircuitBreaker,fallbackUri=forward:/fallback/customers
spring.cloud.gateway.routes[2].id=billing-service
spring.cloud.gateway.routes[2].uri=lb://billing-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/billing/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/billing/(?<segment>.*), /bills/${segment}
spring.cloud.gateway.routes[2].filters[1]=CircuitBreaker=name=billingCircuitBreaker,fallbackUri=forward:/fallback/billing
spring.cloud.gateway.routes[3].id=account-service
spring.cloud.gateway.routes[3].uri=lb://account-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/account-service/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/account-service/(?<segment>.*), /${segment}
spring.cloud.gateway.routes[4].id=loan-service
spring.cloud.gateway.routes[4].uri=lb://loan-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/loan-service/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/loan-service/(?<segment>.*), /${segment}
